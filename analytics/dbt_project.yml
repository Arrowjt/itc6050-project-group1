name: 'air_quality_analytics'
version: '1.0.0'
config-version: 2

# Matches the profile name in your ~/.dbt/profiles.yml (or the dbt container's profiles.yml)
profile: 'air_quality'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  air_quality_analytics:
    staging:
      +materialized: view
    marts:
      +materialized: table
