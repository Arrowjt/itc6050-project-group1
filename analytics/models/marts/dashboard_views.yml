version: 2

models:
  - name: kpi_summary
    description: "Single-row KPI numbers for the dashboard header: cities monitored, total readings, date range."
    columns:
      - name: cities_monitored
        tests:
          - not_null

  - name: city_pollution_ranking
    description: "Every city ranked by average pollutant value -- source for the top-N most-polluted-cities chart."
    columns:
      - name: city
        tests:
          - not_null
      - name: parameter
        tests:
          - not_null
          - accepted_values:
              values: ['pm25', 'pm10', 'no2', 'co', 'o3', 'so2']

  - name: who_pm25_alerts
    description: "City-days where average PM2.5 exceeded the WHO safe-air limit (25 µg/m³)."
    columns:
      - name: city
        tests:
          - not_null
      - name: pm25_avg_value
        tests:
          - not_null